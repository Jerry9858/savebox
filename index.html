<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savebox | Secure Your Digital Life</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .hero-gradient { background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 70%); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center hero-gradient">

    <div class="max-w-4xl">
        <div class="mb-6 inline-block px-4 py-1 rounded-full border border-white/10 text-[10px] uppercase tracking-[0.3em] text-gray-500">
            Now with Cloud Encryption
        </div>
        
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-8 italic">SAVEBOX.</h1>
        
        <p class="text-gray-400 text-lg md:text-xl mb-12 max-w-xl mx-auto leading-relaxed">
            The minimalist vault for your digital assets. Securely store notes and images in the cloud or keep it local.
        </p>
        
        <div class="flex flex-col md:flex-row gap-5 justify-center items-center">
            <a href="login.html" class="w-full md:w-auto bg-white text-black px-12 py-4 rounded-full font-bold hover:bg-gray-200 transition shadow-xl shadow-white/5 text-lg">
                Login to Cloud
            </a>
            
            <a href="dashboard-demo.html" class="w-full md:w-auto glass px-12 py-4 rounded-full font-bold hover:bg-white/5 transition border-white/20 text-lg">
                Try Local Demo
            </a>
        </div>

        <div class="mt-20 flex gap-8 justify-center opacity-20 text-[10px] uppercase tracking-[0.2em]">
            <span>End-to-End</span>
            <span>Zero Knowledge</span>
            <span>Open Source</span>
        </div>
    </div>

</body>
</html>
