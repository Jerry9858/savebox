<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savebox | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scrollbar-gutter: stable; }
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .item-hover:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); transition: 0.3s; }
        .delete-btn { opacity: 0; transition: 0.2s; }
        .item-hover:hover .delete-btn { opacity: 1; }
        #viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 100; align-items: center; justify-content: center; }
        #viewContent::-webkit-scrollbar { width: 4px; }
        #viewContent::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 border-r border-white/10 p-10 hidden lg:flex flex-col">
        <div class="text-2xl font-bold mb-10 tracking-tighter uppercase">SAVEBOX</div>
        <nav class="space-y-4 flex-grow">
            <div class="text-white font-medium bg-white/10 p-3 rounded-lg cursor-pointer">All Items</div>
        </nav>
        <div class="space-y-4">
            <button onclick="clearAll()" class="text-[10px] text-gray-600 hover:text-red-500 transition uppercase tracking-widest text-left">Clear All Data</button>
            <a href="index.html" class="block text-xs text-gray-400 hover:text-white transition uppercase">← Log Out</a>
        </div>
    </aside>

    <main class="flex-grow p-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <h2 class="text-3xl font-bold tracking-tight">Your Vault</h2>
            
            <div class="flex-grow max-w-md w-full md:mx-10">
                <input type="text" id="searchInput" onkeyup="searchVault()" placeholder="Search titles or content..." class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-2 text-sm focus:outline-none focus:border-white/30 transition text-white">
            </div>

            <div class="flex gap-4">
                <input type="file" id="fileInput" class="hidden" onchange="handleFile(this)">
                <button onclick="document.getElementById('fileInput').click()" class="border border-white/20 px-6 py-2 rounded-full font-bold hover:bg-white/10 transition text-sm">Upload File</button>
                <button onclick="addNote()" class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition text-sm">New Note</button>
            </div>
        </header>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <div id="viewer" onclick="this.style.display='none'">
        <div class="max-w-3xl w-full p-10 glass text-center relative" onclick="event.stopPropagation()">
            <h2 id="viewTitle" class="text-2xl font-bold mb-4"></h2>
            <div id="viewContent" class="text-gray-400 mb-8 whitespace-pre-wrap max-h-96 overflow-y-auto"></div>
            <button onclick="document.getElementById('viewer').style.display='none'" class="bg-white text-black px-8 py-2 rounded-full font-bold">Close</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', loadItems);

        function addNote() {
            const title = prompt("Note Title:");
            const content = prompt("Enter your text:");
            if (title && content) {
                const item = { id: Date.now(), type: 'note', title, content, date: new Date().toLocaleDateString() };
                saveAndRender(item);
            }
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const item = { id: Date.now(), type: 'image', title: file.name, content: e.target.result, date: new Date().toLocaleDateString() };
                saveAndRender(item);
            };
            reader.readAsDataURL(file);
        }

        function saveAndRender(item) {
            let items = JSON.parse(localStorage.getItem('savebox_v5')) || [];
            items.push(item);
            localStorage.setItem('savebox_v5', JSON.stringify(items));
            renderItem(item);
        }

        function loadItems() {
            const grid = document.getElementById('vaultGrid');
            grid.innerHTML = ''; 
            let items = JSON.parse(localStorage.getItem('savebox_v5')) || [];
            items.forEach(renderItem);
        }

        function renderItem(item) {
            const grid = document.getElementById('vaultGrid');
            const card = document.createElement('div');
            card.className = "glass h-64 p-6 flex flex-col justify-between item-hover cursor-pointer relative vault-item";
            card.id = `card-${item.id}`;
            
            // Store both title and content for deep searching
            card.setAttribute('data-title', item.title.toLowerCase());
            // Only store text content for searching, ignore image data strings
            const searchContent = item.type === 'note' ? item.content.toLowerCase() : "";
            card.setAttribute('data-content', searchContent);

            card.onclick = () => openViewer(item);
            
            card.innerHTML = `
                <button onclick="deleteItem(${item.id}, event)" class="delete-btn absolute top-4 right-4 text-[10px] bg-red-500/20 hover:bg-red-500 text-red-200 hover:text-white px-2 py-1 rounded transition uppercase">Remove</button>
                <div class="h-32 bg-black/40 rounded-xl overflow-hidden flex items-center justify-center border border-white/5">
                    ${item.type === 'image' ? `<img src="${item.content}" class="w-full h-full object-cover">` : '<span class="text-4xl">📝</span>'}
                </div>
                <div>
                    <p class="font-medium truncate">${item.title}</p>
                    <p class="text-xs text-gray-500 uppercase tracking-widest">${item.type} • ${item.date}</p>
                </div>
            `;
            grid.appendChild(card);
        }

        function searchVault() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.vault-item');
            
            items.forEach(item => {
                const title = item.getAttribute('data-title');
                const content = item.getAttribute('data-content');
                
                // Deep Search: Checks if query is in title OR in text content
                if (title.includes(query) || content.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function deleteItem(id, event) {
            event.stopPropagation();
            if(confirm("Permanently remove this item?")) {
                let items = JSON.parse(localStorage.getItem('savebox_v5')) || [];
                items = items.filter(i => i.id !== id);
                localStorage.setItem('savebox_v5', JSON.stringify(items));
                document.getElementById(`card-${id}`).remove();
            }
        }

        function clearAll() {
            if(confirm("Are you sure you want to delete EVERYTHING?")) {
                localStorage.removeItem('savebox_v5');
                location.reload();
            }
        }

        function openViewer(item) {
            const viewer = document.getElementById('viewer');
            document.getElementById('viewTitle').innerText = item.title;
            const contentArea = document.getElementById('viewContent');
            if(item.type === 'image') {
                contentArea.innerHTML = `<img src="${item.content}" class="max-h-80 mx-auto rounded-lg">`;
            } else {
                contentArea.innerText = item.content;
            }
            viewer.style.display = 'flex';
        }
    </script>
</body>
</html>
