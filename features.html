<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scrollbar-gutter: stable; }
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
    </style>
</head>
<body class="p-10 min-h-screen">
    <nav class="flex justify-between items-center max-w-7xl mx-auto mb-20">
        <a href="index.html" class="text-2xl font-bold tracking-tighter uppercase">SAVEBOX</a>
        <a href="index.html" class="text-gray-500 hover:text-white transition font-medium">← Back</a>
    </nav>
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-5xl md:text-7xl font-bold mb-12 tracking-tight">Built for the collector.</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
            <div class="glass p-8">
                <h3 class="text-xl font-bold mb-2">Liquid Sync</h3>
                <p class="text-gray-400 leading-relaxed">Your data flows between Mac, iPhone, and Web instantly. No cables, no friction.</p>
            </div>
            <div class="glass p-8">
                <h3 class="text-xl font-bold mb-2">AI Neural Sorting</h3>
                <p class="text-gray-400 leading-relaxed">Savebox automatically categorizes your links and files based on your personal style.</p>
            </div>
        </div>
    </div>
</body>
</html>
