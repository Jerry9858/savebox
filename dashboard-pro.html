<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savebox Pro | Advanced Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html { scrollbar-gutter: stable; }
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .item-hover:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); transition: 0.3s; }
        .delete-btn { opacity: 0; transition: 0.2s; }
        .item-hover:hover .delete-btn { opacity: 1; }
        #viewer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 100; align-items: center; justify-content: center; }
        .pro-badge { background: linear-gradient(90deg, #ff4d4d, #f9cb28); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 border-r border-white/10 p-10 hidden lg:flex flex-col">
        <div class="text-2xl font-bold mb-2 tracking-tighter uppercase">SAVEBOX <span class="pro-badge text-xs">PRO</span></div>
        <p class="text-[10px] text-gray-500 mb-10 uppercase tracking-[0.2em]">Priority Workspace</p>
        <nav class="space-y-4 flex-grow">
            <div class="text-white font-medium bg-white/10 p-3 rounded-lg cursor-pointer">Cloud Vault</div>
        </nav>
        <button onclick="handleLogout()" class="block text-left text-xs text-gray-400 hover:text-white transition uppercase">← Log Out</button>
    </aside>

    <main class="flex-grow p-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
            <h2 class="text-3xl font-bold tracking-tight">Pro Vault</h2>
            <div class="flex-grow max-w-md w-full md:mx-10">
                <input type="text" id="searchInput" onkeyup="filterVault()" placeholder="Deep search..." class="w-full bg-white/5 border border-white/10 rounded-full px-6 py-2 text-sm focus:outline-none text-white">
            </div>
            <div class="flex gap-4">
                <input type="file" id="fileInput" class="hidden" onchange="handleFile(this)">
                <button onclick="document.getElementById('fileInput').click()" class="border border-white/20 px-6 py-2 rounded-full font-bold hover:bg-white/10 transition text-sm">Upload File</button>
                <button onclick="addNote()" class="bg-white text-black px-6 py-2 rounded-full font-bold hover:bg-gray-200 transition text-sm">New Note</button>
            </div>
        </header>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <div id="viewer" onclick="this.style.display='none'">
        <div class="max-w-3xl w-full p-10 glass text-center relative" onclick="event.stopPropagation()">
            <h2 id="viewTitle" class="text-2xl font-bold mb-4"></h2>
            <div id="viewContent" class="text-gray-400 mb-8 whitespace-pre-wrap max-h-96 overflow-y-auto"></div>
            <button onclick="document.getElementById('viewer').style.display='none'" class="bg-white text-black px-8 py-2 rounded-full font-bold">Close</button>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://rdzupecvtmwjjhplresq.supabase.co', 'sb_publishable_sqQ8HfVUTt_KCcAEqq07OA__RZT0-j9');

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
            } else {
                loadItems();
            }
        });

        async function loadItems() {
            const grid = document.getElementById('vaultGrid');
            grid.innerHTML = '';
            const { data, error } = await sb.from('saves').select('*').order('created_at', { ascending: false });
            
            if (error) console.error("Load Error:", error);
            if (data) data.forEach(item => renderItem(item));
        }

        function renderItem(item) {
            const grid = document.getElementById('vaultGrid');
            const card = document.createElement('div');
            card.className = "glass h-64 p-6 flex flex-col justify-between item-hover cursor-pointer relative vault-item";
            card.setAttribute('data-title', item.title.toLowerCase());
            card.setAttribute('data-content', item.type === 'note' ? item.content.toLowerCase() : "");
            
            card.onclick = () => openViewer(item);
            
            card.innerHTML = `
                <button onclick="deleteItem('${item.id}', event)" class="delete-btn absolute top-4 right-4 text-[10px] bg-red-500/20 hover:bg-red-500 text-red-200 px-2 py-1 rounded transition">Remove</button>
                <div class="h-32 bg-black/40 rounded-xl overflow-hidden flex items-center justify-center border border-white/5">
                    ${item.type === 'image' ? `<img src="${item.content}" class="w-full h-full object-cover">` : '<span class="text-4xl">📝</span>'}
                </div>
                <div>
                    <p class="font-medium truncate">${item.title}</p>
                    <p class="text-xs text-gray-500 uppercase tracking-widest">${item.type}</p>
                </div>
            `;
            grid.prepend(card);
        }

        async function addNote() {
            const title = prompt("Note Title:");
            const content = prompt("Content:");
            if (title && content) {
                const { data: { user } } = await sb.auth.getUser();
                const { data, error } = await sb.from('saves').insert([{ 
                    user_id: user.id, 
                    title: title, 
                    content: content, 
                    type: 'note' 
                }]).select();
                
                if (error) alert("Error saving note: " + error.message);
                if (data) renderItem(data[0]);
            }
        }

        async function handleFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const { data: { user } } = await sb.auth.getUser();
                const { data, error } = await sb.from('saves').insert([{ 
                    user_id: user.id, 
                    title: file.name, 
                    content: e.target.result, 
                    type: 'image' 
                }]).select();
                
                if (error) alert("Error uploading file: " + error.message);
                if (data) renderItem(data[0]);
            };
            reader.readAsDataURL(file);
        }

        async function deleteItem(id, event) {
            event.stopPropagation();
            if(confirm("Delete from Cloud?")) {
                const { error } = await sb.from('saves').delete().eq('id', id);
                if (error) alert("Error deleting: " + error.message);
                else location.reload();
            }
        }

        async function handleLogout() { 
            await sb.auth.signOut(); 
            window.location.href = 'index.html'; 
        }

        function openViewer(item) {
            document.getElementById('viewTitle').innerText = item.title;
            document.getElementById('viewContent').innerHTML = item.type === 'image' ? `<img src="${item.content}" class="max-h-80 mx-auto rounded-lg">` : item.content;
            document.getElementById('viewer').style.display = 'flex';
        }

        function filterVault() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.vault-item').forEach(i => {
                const match = i.getAttribute('data-title').includes(q) || i.getAttribute('data-content').includes(q);
                i.style.display = match ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
