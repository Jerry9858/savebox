<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Savebox Pro | Advanced Vault</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        html { scrollbar-gutter: stable; }
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .item-hover:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); transition: 0.3s; }
        
        /* Mobile adjustment for delete button visibility */
        @media (max-width: 768px) { .delete-btn { opacity: 1 !important; } }
        .delete-btn { opacity: 0; transition: 0.2s; }
        .item-hover:hover .delete-btn { opacity: 1; }
        
        .modal-overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); 
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .pro-badge { background: linear-gradient(90deg, #ff4d4d, #f9cb28); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        
        input, textarea { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        .tab-btn { position: relative; padding-bottom: 8px; color: #666; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { color: white; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: white; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 border-r border-white/10 p-10 hidden lg:flex flex-col">
        <div class="text-2xl font-bold mb-2 tracking-tighter uppercase">SAVEBOX <span class="pro-badge text-xs">PRO</span></div>
        <p class="text-[10px] text-gray-500 mb-10 uppercase tracking-[0.2em]">Priority Workspace</p>
        <nav class="space-y-4 flex-grow">
            <div class="text-white font-medium bg-white/10 p-3 rounded-lg cursor-pointer">Cloud Vault</div>
        </nav>
        <button onclick="handleLogout()" class="block text-left text-xs text-gray-400 hover:text-white transition uppercase">← Log Out</button>
    </aside>

    <main class="flex-grow p-6 md:p-10">
        <header class="mb-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                <h2 class="text-2xl md:text-3xl font-bold tracking-tight">Pro Vault</h2>
                <div class="flex-grow max-w-md w-full md:mx-10">
                    <input type="text" id="searchInput" onkeyup="filterVault()" placeholder="Deep search..." class="w-full rounded-full px-6 py-2 text-sm">
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <input type="file" id="fileInput" class="hidden" onchange="handleFile(this)">
                    <button onclick="document.getElementById('fileInput').click()" class="flex-1 md:flex-none border border-white/20 px-4 py-2 rounded-full font-bold hover:bg-white/10 transition text-xs md:text-sm">Upload</button>
                    <button onclick="openNoteModal()" class="flex-1 md:flex-none bg-white text-black px-4 py-2 rounded-full font-bold hover:bg-gray-200 transition text-xs md:text-sm">New Note</button>
                </div>
            </div>

            <div class="flex gap-6 border-b border-white/5 text-xs md:text-sm font-bold overflow-x-auto whitespace-nowrap">
                <button onclick="switchTab('all', this)" class="tab-btn active">All Items</button>
                <button onclick="switchTab('note', this)" class="tab-btn">Notes</button>
                <button onclick="switchTab('image', this)" class="tab-btn">Files & Images</button>
            </div>
        </header>

        <div id="vaultGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6"></div>
    </main>

    <div id="noteModal" class="modal-overlay">
        <div class="glass max-w-lg w-full p-6 md:p-8 relative">
            <h3 class="text-xl font-bold mb-6">Create Note</h3>
            <input type="text" id="noteTitle" placeholder="Title" class="w-full mb-4 px-4 py-3 rounded-xl font-bold">
            <textarea id="noteContent" placeholder="Start typing..." class="w-full h-48 px-4 py-3 rounded-xl resize-none mb-6"></textarea>
            <div class="flex gap-3">
                <button onclick="saveNote()" class="flex-grow bg-white text-black py-3 rounded-xl font-bold">Save</button>
                <button onclick="closeNoteModal()" class="px-6 py-3 border border-white/10 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="viewer" class="modal-overlay" onclick="this.style.display='none'">
        <div class="max-w-3xl w-full p-6 md:p-10 glass text-center relative" onclick="event.stopPropagation()">
            <h2 id="viewTitle" class="text-xl md:text-2xl font-bold mb-4"></h2>
            <div id="viewContent" class="text-gray-400 mb-8 whitespace-pre-wrap max-h-80 overflow-y-auto text-sm"></div>
            <div class="flex gap-4 justify-center">
                <button id="downloadBtn" class="bg-white/10 border border-white/10 px-6 py-2 rounded-full font-bold text-xs">Download</button>
                <button onclick="document.getElementById('viewer').style.display='none'" class="bg-white text-black px-6 py-2 rounded-full font-bold text-xs">Close</button>
            </div>
        </div>
    </div>

    <script>
        const sb = supabase.createClient('https://rdzupecvtmwjjhplresq.supabase.co', 'sb_publishable_sqQ8HfVUTt_KCcAEqq07OA__RZT0-j9');
        let currentFilter = 'all';

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) window.location.href = 'login.html';
            else loadItems();
        });

        function renderItem(item) {
            const grid = document.getElementById('vaultGrid');
            const card = document.createElement('div');
            card.className = "glass h-56 md:h-64 p-5 md:p-6 flex flex-col justify-between item-hover cursor-pointer relative vault-item";
            card.setAttribute('data-type', item.type);
            card.setAttribute('data-title', item.title.toLowerCase());
            card.onclick = () => openViewer(item);
            card.innerHTML = `
                <button onclick="deleteItem('${item.id}', event)" class="delete-btn absolute top-3 right-3 text-[10px] bg-red-500/20 text-red-200 px-2 py-1 rounded z-50">Remove</button>
                <div class="h-28 md:h-32 bg-black/40 rounded-xl overflow-hidden flex items-center justify-center border border-white/5">
                    ${item.type === 'image' ? `<img src="${item.content}" class="w-full h-full object-cover">` : '<span class="text-3xl">📝</span>'}
                </div>
                <div class="mt-2">
                    <p class="font-medium truncate text-sm">${item.title}</p>
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">${item.type}</p>
                </div>
            `;
            grid.prepend(card);
            filterVault();
        }

        async function deleteItem(id, event) {
            event.stopPropagation();
            if(confirm("Delete from Cloud?")) {
                const { error } = await sb.from('saves').delete().eq('id', id);
                if (error) alert("Error: " + error.message);
                else location.reload();
            }
        }

        // Search/Tab/Upload logic remains identical to keep the same Pro features
        function switchTab(type, el) { currentFilter = type; document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); el.classList.add('active'); filterVault(); }
        function filterVault() { const searchQ = document.getElementById('searchInput').value.toLowerCase(); document.querySelectorAll('.vault-item').forEach(i => { const typeMatch = (currentFilter === 'all' || i.getAttribute('data-type') === currentFilter); const searchMatch = i.getAttribute('data-title').includes(searchQ); i.style.display = (typeMatch && searchMatch) ? 'flex' : 'none'; }); }
        async function loadItems() { const grid = document.getElementById('vaultGrid'); grid.innerHTML = ''; const { data } = await sb.from('saves').select('*').order('created_at', { ascending: false }); if (data) data.forEach(item => renderItem(item)); }
        function openNoteModal() { document.getElementById('noteModal').style.display = 'flex'; }
        function closeNoteModal() { document.getElementById('noteModal').style.display = 'none'; }
        async function saveNote() { const title = document.getElementById('noteTitle').value; const content = document.getElementById('noteContent').value; if (title && content) { const { data: { user } } = await sb.auth.getUser(); const { data } = await sb.from('saves').insert([{ user_id: user.id, title, content, type: 'note' }]).select(); if (data) { renderItem(data[0]); closeNoteModal(); } } }
        async function handleFile(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async (e) => { const { data: { user } } = await sb.auth.getUser(); const { data } = await sb.from('saves').insert([{ user_id: user.id, title: file.name, content: e.target.result, type: 'image' }]).select(); if (data) renderItem(data[0]); }; reader.readAsDataURL(file); }
        function openViewer(item) { document.getElementById('viewTitle').innerText = item.title; const contentArea = document.getElementById('viewContent'); contentArea.innerHTML = item.type === 'image' ? `<img src="${item.content}" class="max-h-60 mx-auto rounded-lg">` : item.content; document.getElementById('downloadBtn').onclick = () => { const link = document.createElement('a'); link.href = item.type === 'note' ? URL.createObjectURL(new Blob([item.content], { type: 'text/plain' })) : item.content; link.download = item.type === 'note' ? item.title + ".txt" : item.title; link.click(); }; document.getElementById('viewer').style.display = 'flex'; }
        async function handleLogout() { await sb.auth.signOut(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
